<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#080f18">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="description" content="מאסטר הפנייה — משחק לימודי לתרגול פריטה יוונית על בוזוקי.">
<title>מאסטר הפנייה | Penia Master</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/game.css">
</head>
<body>

<div id="splash" class="splash">
  <svg class="splash-logo" viewBox="0 0 120 120" aria-hidden="true">
    <circle cx="60" cy="60" r="54" fill="none" stroke="#e3b341" stroke-width="2" opacity="0.4"/>
    <path d="M35 75 L55 35 L75 75 Z" fill="#e3b341" opacity="0.9"/>
    <text x="60" y="98" fill="#4fb3d9" font-size="11" text-anchor="middle" font-family="Heebo">↓ ↑</text>
  </svg>
  <h1>מאסטר הפנייה</h1>
  <p>Penia Master · Πενιά</p>
  <div class="splash-bar"><div class="splash-fill"></div></div>
</div>

<div class="app" id="app">

  <!-- ONBOARDING (פעם ראשונה בלבד) -->
  <section class="screen" id="screen-onboard">
    <div class="ob-wrap">
      <div class="ob-icon">🎸</div>
      <h2>פנייה — משחק קצב</h2>
      <p>חיצים ↓↑ זורמים אל הקו הזהב.<br>הקישו ↓ או ↑ בזמן — מקלדת, מגע על המסך, או J/K.</p>
      <p class="ob-note">עם בוזוקי: פרטו על מיתר מושתק + הקשה במקביל.<br>המשחק שומע <b>הקשות</b>, לא מיקרופון.</p>
      <button class="btn gold ob-start" id="ob-start">▶ התחל</button>
    </div>
  </section>

  <!-- מסך משחק יחיד — הכול כאן -->
  <section class="screen" id="screen-game">
    <header class="game-bar">
      <button class="bar-btn" id="btn-menu" type="button" aria-label="תפריט">☰</button>
      <div class="bar-center">
        <select id="level-select" class="level-select" aria-label="בחר שלב"></select>
        <span class="bar-bpm" id="bar-bpm">60 BPM</span>
      </div>
      <div class="bar-score" dir="ltr">
        <b id="hud-score">0</b>
        <span id="hud-combo"></span>
      </div>
    </header>

    <div class="game-stage">
      <canvas id="game-canvas"></canvas>
      <div class="results-overlay" id="results-panel"></div>
      <p class="status-line" id="status-line"></p>
    </div>

    <footer class="game-dock">
      <button class="dock-side" id="btn-level-prev" type="button" aria-label="שלב קודם">‹</button>
      <button class="dock-play" id="btn-play" type="button">▶ שחק</button>
      <button class="dock-side" id="btn-level-next" type="button" aria-label="שלב הבא">›</button>
    </footer>
  </section>

  <!-- תפריט צד -->
  <div class="sheet-backdrop" id="sheet-backdrop"></div>
  <aside class="sheet" id="menu-sheet">
    <header class="sheet-head">
      <h2>תפריט</h2>
      <button class="bar-btn" id="btn-close-menu" type="button">✕</button>
    </header>

    <button class="sheet-player" id="player-chip" type="button"></button>

    <div class="sheet-section">
      <label class="sheet-label">מהירות</label>
      <div class="bpm-row">
        <button class="bar-btn" id="btn-bpm-down" type="button">−</button>
        <span class="bpm-val"><b id="play-bpm-val">60</b> BPM</span>
        <button class="bar-btn" id="btn-bpm-up" type="button">+</button>
      </div>
    </div>

    <button class="sheet-link" id="btn-calib" type="button">⚙ כיול תזמון</button>
    <button class="sheet-link" id="btn-show-lb" type="button">🏆 לוח תוצאות</button>
    <button class="sheet-link" id="btn-show-players" type="button">👥 שחקנים</button>

    <div class="sheet-stats" id="comm-local"></div>
    <div id="comm-global"></div>

    <details class="sheet-tip">
      <summary>💡 טיפ לשלב</summary>
      <p id="play-tip"></p>
    </details>
  </aside>

  <!-- לוח תוצאות (מסך מלא) -->
  <section class="screen overlay-screen" id="screen-leaderboard">
    <header class="overlay-head">
      <button class="bar-btn overlay-back" type="button" data-back="game">→</button>
      <h2>🏆 תוצאות</h2>
    </header>
    <select id="lb-level" class="select-full"></select>
    <div class="lb-list" id="lb-list"></div>
  </section>

  <!-- שחקנים (מסך מלא) -->
  <section class="screen overlay-screen" id="screen-players">
    <header class="overlay-head">
      <button class="bar-btn overlay-back" type="button" data-back="game">→</button>
      <h2>👥 שחקנים</h2>
    </header>
    <div class="players-list" id="players-list"></div>
    <form id="add-player-form" class="add-player" autocomplete="off">
      <input type="text" id="new-player-name" placeholder="שם נגן חדש" maxlength="20" autocomplete="name" enterkeyhint="done">
      <div class="avatar-pick" id="avatar-pick"></div>
      <p class="player-feedback" id="player-feedback" aria-live="polite"></p>
      <button class="btn gold full" id="btn-add-player" type="submit">+ הוסף</button>
    </form>
  </section>
</div>

<script src="config.js" onerror="void 0"></script>
<script src="js/levels.js"></script>
<script src="js/audio.js"></script>
<script src="js/community.js"></script>
<script src="js/players.js"></script>
<script src="js/engine.js"></script>
<script src="js/app.js"></script>
</body>
</html>
